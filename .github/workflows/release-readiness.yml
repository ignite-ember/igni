name: Release readiness

# Runs the end-to-end onboarding smoke that exercises the exact path
# a new user takes: download uv → install Python → install
# ignite-ember → prefetch embedding model → spawn the BE → confirm
# the ready line. ~2-3 min per platform.
#
# Why a separate workflow:
#   - It downloads ~150 MB and takes ~3 min — too slow for every PR.
#   - The thing that breaks here is rarely the FE code; it's PyPI
#     wheel availability, uv release-asset URLs, model-cache layout.
#     Those drift on their own schedule (PyPI maintenance, uv minor
#     bumps, HuggingFace outages), so a nightly + on-tag schedule
#     catches them BEFORE we cut a release.
#
# Triggers:
#   - Tag push (``v*``) — final gate before publishing.
#   - Nightly cron — surfaces upstream drift in a recognisable
#     window.
#   - Manual dispatch — for verifying a specific commit.

on:
  push:
    tags: ["v*"]
  schedule:
    # 06:00 UTC = ~11 PM PT the night before. Fast feedback for
    # any drift overnight.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "ignite-ember version to install (blank = read from pyproject.toml)"
        required: false
        default: ""
      use_local:
        description: "Install from the working tree instead of PyPI"
        type: boolean
        default: false

jobs:
  # Proxy-propagation integration test. Stands up a tiny logging
  # HTTP/HTTPS proxy, sets HTTPS_PROXY, runs the same uv-download
  # command ``runtime.ts::downloadUv`` issues when proxyEnv is
  # set, and asserts the proxy log shows a CONNECT to github.com.
  # Catches the regression where the FE reads a proxy from IDE
  # settings but the env var never reaches the subprocess.
  proxy-propagation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run proxy integration test
        run: ./scripts/test-proxy-integration.sh

  # POSIX smoke — macOS + Linux. Bash script + tar.gz uv archive.
  smoke-posix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for PyPI CDN to propagate
        # On tag pushes, release-readiness runs almost immediately
        # after ``publish-pypi``, and the PyPI CDN (JSON index +
        # sdist file) needs 1–5 minutes to expose a fresh version.
        # Polling the JSON index is cheap and returns 200 as soon
        # as the release row is queryable — gate the smoke script
        # on that so ``uv pip install ignite-ember==X.Y.Z`` doesn't
        # race the propagation and fail unsatisfiable. Skipped when
        # ``use_local=true`` (manual dispatch with local sdist).
        # Only gate on PyPI when we're actually installing a freshly-
        # tagged version. On the nightly ``schedule`` run there's no
        # tag ref — the smoke script reads pyproject and installs
        # whatever's already published, so waiting would be a no-op
        # (or worse, wait for a bogus version derived from
        # ``refs/heads/main``).
        if: ${{ inputs.use_local != true && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version != '')) }}
        run: |
          # Derive the version being smoked. On tag push we use the
          # tag ref; the pyproject stays in lockstep via CI so
          # either source works, but the tag is authoritative.
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF##*/v}"
          fi
          URL="https://pypi.org/pypi/ignite-ember/${VERSION}/json"
          echo "waiting for $URL"
          for i in $(seq 1 20); do
            if curl -fsSL -o /dev/null "$URL"; then
              echo "pypi visible after $((i*30 - 30))s"
              exit 0
            fi
            echo "  attempt $i/20 — not yet, waiting 30s"
            sleep 30
          done
          echo "::error::PyPI never returned 200 for ignite-ember==$VERSION after 10 minutes"
          exit 1

      - name: Run onboarding smoke (POSIX)
        env:
          UV_HTTP_TIMEOUT: "120"
        run: |
          ARGS=()
          if [[ "${{ inputs.use_local }}" == "true" ]]; then
            ARGS+=(--local)
          fi
          if [[ -n "${{ inputs.version }}" ]]; then
            ARGS+=(--version "${{ inputs.version }}")
          fi
          ./scripts/onboarding-smoke.sh "${ARGS[@]}"

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-smoke-logs-${{ matrix.os }}
          path: /tmp/ember-onboarding-*/be-*.log
          if-no-files-found: ignore
          retention-days: 7

  # Windows smoke — separate job because the shell, archive format,
  # and ``Start-Process`` flow are different enough that a single
  # script would be a mess of branches. ``onboarding-smoke.ps1``
  # mirrors the POSIX script step-by-step.
  smoke-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for PyPI CDN to propagate
        # Windows equivalent of the smoke-posix wait step. Same
        # rationale — bash + curl equivalents rewritten in pwsh
        # because ``curl.exe`` isn't reliably on the default
        # Windows runner PATH and ``Invoke-WebRequest`` is native.
        # Only gate on PyPI when we're actually installing a freshly-
        # tagged version. On the nightly ``schedule`` run there's no
        # tag ref — the smoke script reads pyproject and installs
        # whatever's already published, so waiting would be a no-op
        # (or worse, wait for a bogus version derived from
        # ``refs/heads/main``).
        if: ${{ inputs.use_local != true && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version != '')) }}
        shell: pwsh
        run: |
          if ("${{ inputs.version }}") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "$env:GITHUB_REF" -replace '^refs/tags/v', ''
          }
          $url = "https://pypi.org/pypi/ignite-ember/$version/json"
          Write-Host "waiting for $url"
          for ($i = 1; $i -le 20; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $url -UseBasicParsing -Method Head -TimeoutSec 15 -ErrorAction Stop
              if ($r.StatusCode -eq 200) {
                Write-Host "pypi visible after $((($i - 1) * 30))s"
                exit 0
              }
            } catch {
              Write-Host "  attempt $i/20 — not yet, waiting 30s"
              Start-Sleep -Seconds 30
            }
          }
          Write-Error "PyPI never returned 200 for ignite-ember==$version after 10 minutes"
          exit 1

      - name: Run onboarding smoke (Windows)
        shell: pwsh
        env:
          UV_HTTP_TIMEOUT: "120"
        run: |
          $args = @()
          if ("${{ inputs.use_local }}" -eq "true") { $args += "-Local" }
          if ("${{ inputs.version }}") { $args += "-Version"; $args += "${{ inputs.version }}" }
          & ./scripts/onboarding-smoke.ps1 @args

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: onboarding-smoke-logs-windows
          path: ${{ runner.temp }}/ember-onboarding-*/be-*.log
          if-no-files-found: ignore
          retention-days: 7
