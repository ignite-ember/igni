name: Test updater signing (manual)

# Manually-triggered probe for the auto-updater signing flow.
# Builds the macOS Tauri app exactly like a real release would,
# then RE-SIGNS the resulting .app.tar.gz ourselves with minisign
# (using the same TAURI_SIGNING_PRIVATE_KEY tauri-bundler used) and
# verifies the new signature with the public key embedded in
# tauri.conf.json. Goal: prove out the re-sign step in isolation
# before wiring it into release.yml.
#
# tauri-action's built-in latest.json assembly fails for product
# names with spaces ("Ember Code") AND it deletes the .sig file
# after building, so by the time we'd try to stash the .sig from
# disk it's already gone. Re-signing solves both: we don't need
# the original .sig at all; the runner has the key.

on:
  # ``workflow_dispatch`` only works for workflows already on the
  # default branch; this file isn't merged yet so we use ``push``
  # gated to this fix branch. Each commit on the branch triggers
  # a fresh run, and only this branch — main and feature branches
  # stay unaffected.
  push:
    branches:
      - fix/updater-resign

jobs:
  build-and-resign:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/tauri/src-tauri

      - name: Install minisign + jq
        run: brew install minisign jq

      - name: Build shared web UI
        run: |
          cd clients/web
          npm ci
          npm run build

      # Run tauri-action exactly like release.yml does — without
      # an upload (no release exists for this branch). The point
      # is to observe whether the .app.tar.gz.sig file persists
      # after tauri-action finishes: that's the question that
      # determines whether release.yml can "stash directly" or
      # has to re-sign with minisign.
      - name: Build via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: clients/tauri
          # No tagName / releaseId — we just want the bundle.
          args: --target aarch64-apple-darwin

      - name: List bundle dir after tauri-action
        run: |
          echo "=== bundle/macos contents ==="
          ls -la clients/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ || true
          echo "=== any *.sig in target ==="
          find clients/tauri/src-tauri/target -name '*.sig' || true

      # Two-stage verification:
      #   1. tauri-bundler produced an ``.app.tar.gz.sig`` in the
      #      same dir as the tarball — confirm it verifies against
      #      the embedded pubkey. This is the "happy path" if we
      #      ever stop using tauri-action and bundle directly.
      #   2. RE-sign the same tarball with minisign CLI using the
      #      same secret key. This is the path release.yml will
      #      use after tauri-action (which deletes the original
      #      .sig before we can stash it). Confirm THIS sig also
      #      verifies — same pubkey, valid by spec but produced
      #      by a different tool.
      - name: Verify tauri-bundler sig + re-sign with minisign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TARBALL=$(find clients/tauri/src-tauri/target -name '*.app.tar.gz' -not -path '*.app/*' -print -quit)
          if [ -z "$TARBALL" ]; then
            echo "::error::No .app.tar.gz found"
            find clients/tauri/src-tauri/target -name '*.tar.gz' -maxdepth 8 || true
            exit 1
          fi
          echo "Tarball: $TARBALL"

          # Decode the public key embedded in tauri.conf.json (same
          # base64 wrapping as the private key — see
          # ``secrets/ember-code/tauri-updater-public.key`` for the
          # un-wrapped form).
          PUBKEY_B64=$(jq -r '.plugins.updater.pubkey' clients/tauri/src-tauri/tauri.conf.json)
          printf '%s' "$PUBKEY_B64" | base64 -d > /tmp/pub.key

          # ── Stage 1: verify tauri-bundler's own .sig ─────────────
          # The .sig file tauri-bundler writes is the *standard
          # minisign signature, base64-encoded a second time*.
          # That's the format the Tauri updater client expects to
          # read out of ``latest.json`` — handy for embedding in
          # JSON without newline escaping, but minisign CLI needs
          # the raw form to verify. So decode first.
          ORIG_SIG="${TARBALL}.sig"
          if [ -f "$ORIG_SIG" ]; then
            echo "=== tauri-bundler sig (base64-wrapped, $ORIG_SIG) ==="
            cat "$ORIG_SIG"
            echo "===================================================="
            base64 -d < "$ORIG_SIG" > /tmp/orig.minisig
            echo "=== decoded (raw minisign format) ==="
            cat /tmp/orig.minisig
            echo "====================================="
            minisign -V -p /tmp/pub.key -m "$TARBALL" -x /tmp/orig.minisig
            echo "✓ tauri-bundler sig verifies (after base64-decode)"
          else
            echo "::warning::tauri-bundler didn't produce $ORIG_SIG"
            find clients/tauri/src-tauri/target -name '*.sig' -maxdepth 8 || true
          fi

          # ── Stage 2: re-sign with minisign CLI ───────────────────
          # The env var stores the secret key file base64-encoded.
          # rsign-generated keys are byte-compatible with minisign.
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d > /tmp/priv.key
          echo "=== private key header ==="
          head -1 /tmp/priv.key
          echo "=========================="

          # ``-S -s KEY -m FILE`` signs ``FILE`` using ``KEY``.
          # ``-W`` reads the password from stdin (no tty needed).
          # Output goes to ``FILE.minisig`` by default — RAW
          # minisign format (NOT base64-wrapped).
          rm -f "${TARBALL}.minisig"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | \
            minisign -S -s /tmp/priv.key -m "$TARBALL" -W
          RESIGN="${TARBALL}.minisig"
          echo "=== re-signed (raw minisign) ==="
          cat "$RESIGN"
          echo "================================"
          minisign -V -p /tmp/pub.key -m "$TARBALL" -x "$RESIGN"
          echo "✓ raw re-sign verifies"

          # Now wrap it in base64 to match tauri-bundler's output
          # format — this is what would go into ``latest.json``'s
          # ``signature`` field for the Tauri client to consume.
          base64 < "$RESIGN" | tr -d '\n' > /tmp/resigned.b64
          echo "=== re-signed (base64-wrapped for latest.json) ==="
          cat /tmp/resigned.b64
          echo ""
          echo "=================================================="

          # Sanity: decode our base64 round-trips back to the same
          # raw minisign sig that already verified above. If the
          # client receives this through latest.json, it'll work.
          base64 -d < /tmp/resigned.b64 > /tmp/resigned.minisig
          diff "$RESIGN" /tmp/resigned.minisig
          echo "✓ base64 round-trip identical"

          # Save everything for inspection + the artifact upload below.
          mkdir -p /tmp/updater-sig
          if [ -f "$ORIG_SIG" ]; then cp "$ORIG_SIG" /tmp/updater-sig/tauri-bundler.sig; fi
          cp "$RESIGN" /tmp/updater-sig/minisign-resigned.sig
          cp /tmp/resigned.b64 /tmp/updater-sig/minisign-resigned.sig.b64
          {
            echo "## Tauri-bundler .sig (base64-wrapped — what release.yml needs in latest.json)"
            echo '```'
            [ -f "$ORIG_SIG" ] && cat "$ORIG_SIG" || echo "(not produced)"
            echo '```'
            echo "## Minisign re-signed raw"
            echo '```'
            cat "$RESIGN"
            echo '```'
            echo "## Minisign re-signed base64 (matches tauri-bundler's format)"
            echo '```'
            cat /tmp/resigned.b64
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-sig-aarch64-apple-darwin
          path: /tmp/updater-sig/*.sig
          if-no-files-found: error
          retention-days: 1
