name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Check actor is repo admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq '.permission')
          if [ "$PERMISSION" != "admin" ]; then
            echo "::error::Releases can only be triggered by repo admins. Actor '${{ github.actor }}' has '$PERMISSION' permission."
            exit 1
          fi

  ci:
    needs: authorize
    uses: ./.github/workflows/ci.yml

  publish-pypi:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Belt-and-suspenders: ``pyproject.toml`` is the SoT, but
      # ``src/ember_code/__init__.py``'s ``__version__`` lives outside
      # the build backend's reach. If a release goes out without the
      # author having run ``scripts/sync-version.mjs`` locally, this
      # step makes sure the published wheel exposes the right
      # ``__version__`` at import time.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync version across all clients
        run: node scripts/sync-version.mjs

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # Build the JetBrains plugin zip against the freshly-published
  # ignite-ember version. The plugin bundles a generated
  # ``ember-version.properties`` whose value comes from pyproject.toml
  # via the ``generateEmberVersion`` gradle task — so the just-tagged
  # release version flows automatically into the plugin without a
  # separate bump.
  build-jetbrains-plugin:
    needs: publish-pypi
    runs-on: ubuntu-latest
    outputs:
      plugin-zip: ${{ steps.locate.outputs.path }}
      plugin-name: ${{ steps.locate.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      # ``scripts/build-clients.sh`` invokes ``npm run build`` in
      # ``clients/web/`` but does NOT ``npm ci`` first — it's
      # designed for local-dev where ``node_modules`` is already on
      # disk. CI starts clean, so we install deps explicitly here.
      - name: Install web deps
        run: |
          cd clients/web
          npm ci

      - name: Build shared web UI and stage into plugin tree
        run: ./scripts/build-clients.sh

      - name: Build JetBrains plugin
        run: |
          cd clients/jetbrains
          ./gradlew buildPlugin --no-daemon

      - name: Locate built zip
        id: locate
        run: |
          ZIP=$(ls clients/jetbrains/build/distributions/*.zip | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: clients/jetbrains/build/distributions/*.zip
          retention-days: 30

      # Push to the JetBrains Marketplace. ``publishPlugin`` reads
      # the already-built zip from ``build/distributions/`` — same
      # bytes that get uploaded as the GitHub-Release artifact, so
      # users get an identical bundle through either channel.
      #
      # ``JETBRAINS_MARKETPLACE_TOKEN`` is an upload token created
      # at https://plugins.jetbrains.com/author/me/tokens with the
      # "Upload Plugin" scope for the ``Ember Code`` plugin.
      #
      # CRITICAL: JetBrains requires the FIRST upload of a new
      # plugin to go through the web UI at
      # https://plugins.jetbrains.com/plugin/add (so a human sets
      # the listing's license, repo URL, screenshots before
      # automated uploads are accepted). After that one-time
      # manual upload, ``publishPlugin`` works for every
      # subsequent release.
      #
      # Skipped on RC tags for the same reason as the VSCode
      # marketplace push — JetBrains rejects re-uploads of the
      # same version, and our version doesn't change across RC
      # iterations.
      - name: Publish to JetBrains Marketplace
        if: ${{ !contains(github.ref_name, '-') }}
        # Don't fail the whole release if JetBrains rejects:
        #   * "Cannot find plugin" — first upload must be via the
        #     web UI; this clears after the manual one-time setup
        #   * "Version already exists" — same as VSCode, an earlier
        #     RC pushed this version
        # In either case, the plugin zip is still on the GitHub
        # Release page and downloadable; the step is easily
        # re-runnable from the workflow UI once the blocker is
        # cleared.
        continue-on-error: true
        env:
          ORG_GRADLE_PROJECT_jbToken: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          cd clients/jetbrains
          ./gradlew publishPlugin --no-daemon

  # VSCode extension — built against the just-published
  # ignite-ember version. Same SoT trick as the JetBrains plugin:
  # ``scripts/sync-version.mjs`` reads pyproject.toml and writes
  # ``src/version.generated.ts``, which the extension's runtime
  # imports for the ``uv pip install`` pin.
  build-vscode-plugin:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # The npm cache key for both the web bundle and the
          # extension itself derives from their respective lock
          # files. Without an explicit path, setup-node hunts for
          # a lockfile at the repo root (none exists) and fails
          # the job before any build step runs.
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/vscode/package-lock.json

      - name: Build shared web UI
        run: |
          cd clients/web
          npm ci
          npm run build

      - name: Build + package VSCode extension
        run: |
          cd clients/vscode
          npm install --no-audit --no-fund
          npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: clients/vscode/*.vsix
          retention-days: 30

      # Push to the VS Code Marketplace. ``vsce publish --packagePath``
      # uploads the already-built .vsix instead of rebuilding — keeps
      # the marketplace artifact byte-identical to the GitHub-Release
      # artifact, so users get exactly the same bundle whether they
      # install from the marketplace or download the VSIX directly.
      #
      # ``VSCE_PAT`` is a Personal Access Token from
      # https://dev.azure.com/<org>/_usersSettings/tokens with the
      # ``Marketplace > Manage`` scope. The publisher ``ignite-ember``
      # (per ``package.json``) must already exist on
      # https://marketplace.visualstudio.com/manage.
      #
      # Skipped on RC / alpha / beta / dev tags: the marketplace
      # rejects re-uploads of the same version, and ``package.json``'s
      # version doesn't change across RC iterations (it's pinned to
      # ``pyproject.toml``'s SoT). RC tags get a VSIX uploaded as a
      # GitHub-Release artifact for testing; the marketplace push
      # only fires on final-version tags.
      - name: Publish to VS Code Marketplace
        if: ${{ !contains(github.ref_name, '-') }}
        # Don't fail the whole release if the marketplace push
        # rejects the version (most common cause: same version
        # was already published from an earlier RC iteration).
        # The VSIX is still available on the GitHub Release page,
        # and the failure shows as a yellow warning in the
        # workflow log — easy to re-run manually if needed.
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd clients/vscode
          VSIX=$(ls *.vsix | head -1)
          npx --yes @vscode/vsce publish --packagePath "$VSIX" --pat "$VSCE_PAT"

  # Tauri desktop installers — mac (arm + intel), windows, linux.
  # Tauri Action handles the per-platform bundle (.dmg/.msi/.AppImage),
  # generates the updater signatures, and uploads everything to the
  # GitHub Release. ``tagName`` matches the tag we're already on so
  # all artifacts land on one release page.
  #
  # Secrets required (configure in repo → Settings → Secrets):
  #   TAURI_SIGNING_PRIVATE_KEY          base64 of the updater priv key
  #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD passphrase for the priv key
  # Optional (Apple notarization):
  #   APPLE_CERTIFICATE                  .p12 base64
  #   APPLE_CERTIFICATE_PASSWORD
  #   APPLE_SIGNING_IDENTITY             "Developer ID Application: …"
  #   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
  #
  # Why a pre-create-release step: ``tauri-action`` v0 needs a
  # ``releaseId`` to upload its bundles to. Under a push-tag event
  # (we trigger by pushing a ``v*`` tag, not by clicking "Create
  # release") there's no existing release, and the action's
  # find-or-create-by-tag path errors with "Release not found or
  # created" — possibly because the four matrix legs race to
  # create the same release. Pre-creating it as a draft serialises
  # the creation; the matrix uploads in parallel; the final
  # ``github-release`` job downgrades draft → published and adds
  # the VSIX + JetBrains zip.
  prepare-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        id: create
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          # Pre-releases (rc/alpha/beta/dev tags) get the
          # "Pre-release" badge on the releases page so users don't
          # accidentally pick them up as "Latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Leave body empty here — the ``github-release`` job at
          # the end of the workflow generates + sets the final body
          # once every artifact has landed.
          body: ""

  build-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
          - platform: macos-14
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/tauri/src-tauri

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Build shared web UI
        run: |
          cd clients/web
          npm ci
          npm run build

      - name: Build + sign + upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer signing is deferred until enrollment
          # completes (see the local secrets README). When these
          # secrets are unset, GH Actions interpolates them as
          # empty strings — tauri-action passes those to ``security
          # import ""`` which fails. Adding the env vars back is
          # safe once the secrets are populated.
          #
          # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD
          # APPLE_SIGNING_IDENTITY / APPLE_ID
          # APPLE_PASSWORD / APPLE_TEAM_ID
        with:
          projectPath: clients/tauri
          tagName: ${{ github.ref_name }}
          # ``releaseId`` previously came from
          # ``github.event.release.id`` (empty under a push-tag
          # event); then omitted (action couldn't find-or-create
          # reliably across the parallel matrix). Now sourced from
          # the ``prepare-release`` job which pre-creates a draft
          # release exactly once — matrix legs upload to that id.
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          args: ${{ matrix.args }}
          # ``includeUpdaterJson`` makes the action emit ``latest.json``
          # alongside the artifacts; our endpoint in tauri.conf.json
          # points at the ``latest`` release alias so newly-published
          # binaries are picked up the next time the app checks.
          includeUpdaterJson: true

  github-release:
    needs: [prepare-release, publish-pypi, build-jetbrains-plugin, build-vscode-plugin, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JetBrains plugin
        uses: actions/download-artifact@v4
        with:
          name: jetbrains-plugin
          path: artifacts/

      - name: Download VSCode extension
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          # Tag is ``v0.6.0`` / ``v0.6.0-rc.1`` etc. ``pip_version``
          # is the PyPI-installable form (no leading ``v``); previous
          # body used ``${{ github.ref_name }}`` directly, which gave
          # the broken ``pip install ignite-ember==v0.6.0-rc.1`` snippet
          # (pip rejects the ``v`` prefix).
          PIP_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "pip_version=$PIP_VERSION" >> "$GITHUB_OUTPUT"

          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          TAG=${GITHUB_REF#refs/tags/}
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG" -- | head -50)
            # Write multiline output
            {
              echo "body<<RELEASE_EOF"
              echo "$NOTES"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # We target the draft release ``prepare-release`` created at
      # the start of this workflow run, by its explicit ID — NOT by
      # tag. Using ``softprops/action-gh-release`` here used to
      # race with the draft's eventual-consistency lookup, creating
      # a second (empty, published) release with the same tag and
      # then failing to ``finalize`` the original because GitHub
      # rejects ``tag_name`` collisions on PATCH. Using ``gh
      # release`` CLI with the ID we already know avoids the
      # lookup entirely.
      - name: Upload IDE artifacts + publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        run: |
          set -euo pipefail
          # Upload VSIX + JetBrains zip to the existing draft. Tauri
          # bundles were already attached by the build-tauri matrix.
          for f in artifacts/*.zip artifacts/*.vsix; do
            [ -f "$f" ] || continue
            echo "Uploading $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

          # Compose the final body + publish (draft → false). We use
          # the API directly because ``gh release edit`` can't take
          # a release ID; it uses tag, which is fine here since we
          # only have ONE release for this tag (the duplicate-race
          # bug was specific to softprops).
          BODY=$(cat <<'BODY_EOF'
          ${{ steps.notes.outputs.body }}

          ## Install

          **Python (CLI / library):**
          ```bash
          pip install 'ignite-ember==${{ steps.notes.outputs.pip_version }}'
          # or
          uv pip install 'ignite-ember==${{ steps.notes.outputs.pip_version }}'
          ```

          **JetBrains plugin:** download the ``ember-code-jetbrains-*.zip``
          asset below and install via Settings → Plugins → ⚙ →
          Install Plugin from Disk…

          **VSCode extension:** download the ``ember-code-vscode-*.vsix``
          asset below and install with:
          ```bash
          code --install-extension ember-code-vscode-*.vsix
          ```

          Both IDE plugins bootstrap uv + Python + ignite-ember on
          first launch — no manual setup required.
          BODY_EOF
          )

          PRERELEASE=${{ contains(github.ref_name, '-') }}
          gh api -X PATCH \
            "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -f name="${{ github.ref_name }}" \
            -f body="$BODY" \
            -F draft=false \
            -F prerelease=$PRERELEASE \
            --jq '{id, name, draft, prerelease, html_url}'

  update-homebrew:
    needs: publish-pypi
    # Skip on RC / alpha / beta / dev tags. The brew formula
    # tracks the latest STABLE release; pre-release tags don't
    # actually publish a new PyPI sdist (the version in
    # ``pyproject.toml`` is the SoT, ``skip-existing: true`` silently
    # no-ops the publish on RC tags). The homebrew job would 404 on
    # the non-existent ``ignite_ember-X.Y.Zrc1.tar.gz`` file. Run
    # only on tags WITHOUT a hyphen (i.e. ``v1.2.3`` not
    # ``v1.2.3-rc.1``).
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PyPI propagation
        run: sleep 30

      - name: Get tag version
        id: version
        # ``version``  is the raw tag (used for the Brew formula's
        # ``ignite-ember==X`` pin — pip normalises during install so
        # both forms work). ``pypi_version`` is the PEP-440-normalised
        # form used in the PyPI sdist URL: ``files.pythonhosted.org``
        # serves files under the normalised name, so ``0.6.0-rc.1``
        # has to become ``0.6.0rc1`` to resolve.
        run: |
          RAW="${GITHUB_REF#refs/tags/v}"
          NORM=$(python3 -c "
          import re, sys
          v = sys.argv[1]
          # PEP 440 pre/post/dev: collapse the separator + lowercase the kind.
          v = re.sub(r'[-_.]?(alpha|a)[-_.]?(\d+)', r'a\2', v, flags=re.I)
          v = re.sub(r'[-_.]?(beta|b)[-_.]?(\d+)', r'b\2', v, flags=re.I)
          v = re.sub(r'[-_.]?(rc|c|pre|preview)[-_.]?(\d+)', r'rc\2', v, flags=re.I)
          v = re.sub(r'[-_.]?(post|rev|r)[-_.]?(\d+)', r'.post\2', v, flags=re.I)
          v = re.sub(r'[-_.]?dev[-_.]?(\d+)', r'.dev\1', v, flags=re.I)
          print(v)
          " "$RAW")
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "pypi_version=$NORM" >> "$GITHUB_OUTPUT"
          echo "raw=$RAW pypi=$NORM"

      - name: Download sdist and compute SHA
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.pypi_version }}"
          URL="https://files.pythonhosted.org/packages/source/i/ignite-ember/ignite_ember-${VERSION}.tar.gz"
          for i in 1 2 3 4 5; do
            if curl -fsSL -o sdist.tar.gz "$URL" 2>/dev/null; then
              SHA=$(sha256sum sdist.tar.gz | awk '{print $1}')
              echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Failed to download sdist from PyPI after 5 attempts"
          exit 1

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ignite-ember/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Simple formula: create venv, pip install from PyPI (uses wheels)
          cat > Formula/ignite-ember.rb << 'FORMULA'
          class IgniteEmber < Formula
            include Language::Python::Virtualenv

            desc "AI coding assistant with multi-agent orchestration"
            homepage "https://ignite-ember.sh"
            url "PLACEHOLDER_URL"
            sha256 "PLACEHOLDER_SHA"
            license "MIT"

            depends_on "git"
            depends_on "python@3.12"
            depends_on "ripgrep"

            skip_clean "libexec"

            def install
              venv = virtualenv_create(libexec, "python3.12")
              system libexec/"bin/python3.12", "-m", "pip", "install", "--prefer-binary", "ignite-ember==PLACEHOLDER_VERSION"
              bin.install_symlink libexec/"bin/ignite-ember"

              # Clear dylib IDs from Rust-built Python extensions so Homebrew's
              # install_name_tool fixup doesn't fail on them.
              Dir.glob(libexec/"lib/**/*.so").each do |so|
                MachO::Tools.change_dylib_id(so, "") rescue nil
              end
            end

            test do
              assert_match "Ember Code", shell_output("#{bin}/ignite-ember --version")
            end
          end
          FORMULA

          # Fix heredoc indentation and replace placeholders
          sed -i 's/^          //' Formula/ignite-ember.rb
          PYPI_VERSION="${{ steps.version.outputs.pypi_version }}"
          sed -i "s|PLACEHOLDER_URL|https://files.pythonhosted.org/packages/source/i/ignite-ember/ignite_ember-${PYPI_VERSION}.tar.gz|" Formula/ignite-ember.rb
          sed -i "s|PLACEHOLDER_SHA|${SHA}|" Formula/ignite-ember.rb
          sed -i "s|PLACEHOLDER_VERSION|${VERSION}|" Formula/ignite-ember.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ignite-ember.rb
          git commit -m "Update ignite-ember to ${VERSION}"
          git push
