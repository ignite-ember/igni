name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Check actor is repo admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERMISSION=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq '.permission')
          if [ "$PERMISSION" != "admin" ]; then
            echo "::error::Releases can only be triggered by repo admins. Actor '${{ github.actor }}' has '$PERMISSION' permission."
            exit 1
          fi

  ci:
    needs: authorize
    uses: ./.github/workflows/ci.yml

  publish-pypi:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Belt-and-suspenders: ``pyproject.toml`` is the SoT, but
      # ``src/ember_code/__init__.py``'s ``__version__`` lives outside
      # the build backend's reach. If a release goes out without the
      # author having run ``scripts/sync-version.mjs`` locally, this
      # step makes sure the published wheel exposes the right
      # ``__version__`` at import time.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync version across all clients
        run: node scripts/sync-version.mjs

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # Build the JetBrains plugin zip against the freshly-published
  # ignite-ember version. The plugin bundles a generated
  # ``ember-version.properties`` whose value comes from pyproject.toml
  # via the ``generateEmberVersion`` gradle task — so the just-tagged
  # release version flows automatically into the plugin without a
  # separate bump.
  build-jetbrains-plugin:
    needs: publish-pypi
    runs-on: ubuntu-latest
    outputs:
      plugin-zip: ${{ steps.locate.outputs.path }}
      plugin-name: ${{ steps.locate.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Build shared web UI and stage into plugin tree
        run: ./scripts/build-clients.sh

      - name: Build JetBrains plugin
        run: |
          cd clients/jetbrains
          ./gradlew buildPlugin --no-daemon

      - name: Locate built zip
        id: locate
        run: |
          ZIP=$(ls clients/jetbrains/build/distributions/*.zip | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: clients/jetbrains/build/distributions/*.zip
          retention-days: 30

  # VSCode extension — built against the just-published
  # ignite-ember version. Same SoT trick as the JetBrains plugin:
  # ``scripts/sync-version.mjs`` reads pyproject.toml and writes
  # ``src/version.generated.ts``, which the extension's runtime
  # imports for the ``uv pip install`` pin.
  build-vscode-plugin:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build shared web UI
        run: |
          cd clients/web
          npm ci
          npm run build

      - name: Build + package VSCode extension
        run: |
          cd clients/vscode
          npm install --no-audit --no-fund
          npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: clients/vscode/*.vsix
          retention-days: 30

  # Tauri desktop installers — mac (arm + intel), windows, linux.
  # Tauri Action handles the per-platform bundle (.dmg/.msi/.AppImage),
  # generates the updater signatures, and uploads everything to the
  # GitHub Release. ``tagName`` matches the tag we're already on so
  # all artifacts land on one release page.
  #
  # Secrets required (configure in repo → Settings → Secrets):
  #   TAURI_SIGNING_PRIVATE_KEY          base64 of the updater priv key
  #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD passphrase for the priv key
  # Optional (Apple notarization):
  #   APPLE_CERTIFICATE                  .p12 base64
  #   APPLE_CERTIFICATE_PASSWORD
  #   APPLE_SIGNING_IDENTITY             "Developer ID Application: …"
  #   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
  build-tauri:
    needs: publish-pypi
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
          - platform: macos-14
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/tauri/src-tauri

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Build shared web UI
        run: |
          cd clients/web
          npm ci
          npm run build

      - name: Build + sign + upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: clients/tauri
          tagName: ${{ github.ref_name }}
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          # ``includeUpdaterJson`` makes the action emit ``latest.json``
          # alongside the artifacts; our endpoint in tauri.conf.json
          # points at the ``latest`` release alias so newly-published
          # binaries are picked up the next time the app checks.
          includeUpdaterJson: true

  github-release:
    needs: [publish-pypi, build-jetbrains-plugin, build-vscode-plugin, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JetBrains plugin
        uses: actions/download-artifact@v4
        with:
          name: jetbrains-plugin
          path: artifacts/

      - name: Download VSCode extension
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          TAG=${GITHUB_REF#refs/tags/}
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG" -- | head -50)
            # Write multiline output
            {
              echo "body<<RELEASE_EOF"
              echo "$NOTES"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.vsix
          body: |
            ${{ steps.notes.outputs.body }}

            ## Install

            **Python (CLI / library):**
            ```bash
            pip install ignite-ember==${{ github.ref_name }}
            # or
            uv pip install ignite-ember==${{ github.ref_name }}
            ```

            **JetBrains plugin:** download the ``ember-code-jetbrains-*.zip``
            asset below and install via Settings → Plugins → ⚙ →
            Install Plugin from Disk…

            **VSCode extension:** download the ``ember-code-vscode-*.vsix``
            asset below and install with:
            ```bash
            code --install-extension ember-code-vscode-*.vsix
            ```

            Both IDE plugins bootstrap uv + Python + ignite-ember on
            first launch — no manual setup required.

  update-homebrew:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PyPI propagation
        run: sleep 30

      - name: Get tag version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download sdist and compute SHA
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://files.pythonhosted.org/packages/source/i/ignite-ember/ignite_ember-${VERSION}.tar.gz"
          for i in 1 2 3 4 5; do
            if curl -fsSL -o sdist.tar.gz "$URL" 2>/dev/null; then
              SHA=$(sha256sum sdist.tar.gz | awk '{print $1}')
              echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Failed to download sdist from PyPI after 5 attempts"
          exit 1

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ignite-ember/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Simple formula: create venv, pip install from PyPI (uses wheels)
          cat > Formula/ignite-ember.rb << 'FORMULA'
          class IgniteEmber < Formula
            include Language::Python::Virtualenv

            desc "AI coding assistant with multi-agent orchestration"
            homepage "https://ignite-ember.sh"
            url "PLACEHOLDER_URL"
            sha256 "PLACEHOLDER_SHA"
            license "MIT"

            depends_on "git"
            depends_on "python@3.12"
            depends_on "ripgrep"

            skip_clean "libexec"

            def install
              venv = virtualenv_create(libexec, "python3.12")
              system libexec/"bin/python3.12", "-m", "pip", "install", "--prefer-binary", "ignite-ember==PLACEHOLDER_VERSION"
              bin.install_symlink libexec/"bin/ignite-ember"

              # Clear dylib IDs from Rust-built Python extensions so Homebrew's
              # install_name_tool fixup doesn't fail on them.
              Dir.glob(libexec/"lib/**/*.so").each do |so|
                MachO::Tools.change_dylib_id(so, "") rescue nil
              end
            end

            test do
              assert_match "Ember Code", shell_output("#{bin}/ignite-ember --version")
            end
          end
          FORMULA

          # Fix heredoc indentation and replace placeholders
          sed -i 's/^          //' Formula/ignite-ember.rb
          sed -i "s|PLACEHOLDER_URL|https://files.pythonhosted.org/packages/source/i/ignite-ember/ignite_ember-${VERSION}.tar.gz|" Formula/ignite-ember.rb
          sed -i "s|PLACEHOLDER_SHA|${SHA}|" Formula/ignite-ember.rb
          sed -i "s|PLACEHOLDER_VERSION|${VERSION}|" Formula/ignite-ember.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ignite-ember.rb
          git commit -m "Update ignite-ember to ${VERSION}"
          git push
